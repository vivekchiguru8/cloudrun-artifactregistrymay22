steps:
    - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloudrun-may23/docker-repo:$COMMIT_SHA', '.']
  
    - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloudrun-may23/docker-repo:$COMMIT_SHA']
  
    - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'docker-repo',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloudrun-may23/docker-repo:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '8080'
    ]
images:
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloudrun-may23/docker-repo:$COMMIT_SHA'